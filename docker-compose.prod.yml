services:
  db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    ports: []  # Don't expose DB port in production

  backend:
    environment:
      DATABASE_URL: "postgresql+asyncpg://icarus:${POSTGRES_PASSWORD}@db:5432/icarus"
      SYNC_DATABASE_URL: "postgresql://icarus:${POSTGRES_PASSWORD}@db:5432/icarus"
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      AUTH_ENABLED: "true"
      CORS_ORIGINS: '["${FRONTEND_URL:-http://localhost:3000}"]'
    volumes: []  # No bind mounts in production
    command: >
      sh -c "cd /app && alembic upgrade head && python -m scripts.import_data --data-root /data && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    environment:
      NEXT_PUBLIC_API_URL: ${FRONTEND_API_URL:-http://localhost:8000}
      INTERNAL_API_URL: http://backend:8000
    deploy:
      resources:
        limits:
          memory: 256M
